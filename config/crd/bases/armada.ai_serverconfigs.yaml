---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: serverconfigs.armada.ai
spec:
  group: armada.ai
  names:
    kind: ServerConfig
    listKind: ServerConfigList
    plural: serverconfigs
    shortNames:
    - sc
    singular: serverconfig
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.serviceTag
      name: ServiceTag
      type: string
    - jsonPath: .spec.hostname
      name: Hostname
      type: string
    - jsonPath: .spec.oobIP
      name: OobIP
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1
    schema:
      openAPIV3Schema:
        description: |-
          ServerConfig is a domain child CR owned by a ConfigBundle.
          Created and updated by the ConfigBundle Controller via SSA (field manager: "configbundle-controller").
          The ServerConfig Controller (separate, out of scope for v1) actuates the spec via Redfish.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              ServerConfigSpec mirrors the ServerSpec from ConfigBundle.
              The ConfigBundle controller creates and updates this CR via SSA.
              Local admins may override individual fields using field manager "local:<admin-id>".
            properties:
              hostname:
                description: Hostname is the server's hostname for display and logging.
                type: string
              idrac:
                description: Idrac holds desired iDRAC configuration.
                properties:
                  dhcpEnabled:
                    type: boolean
                  firmwareVersion:
                    description: |-
                      FirmwareVersion is the desired iDRAC firmware version (e.g. "7.20.10.05").
                      Controller reads current version via Redfish GET and upgrades/downgrades to match.
                    type: string
                  ipmiEnabled:
                    type: boolean
                  lockdownModeEnabled:
                    type: boolean
                  osToIdracPassThroughEnabled:
                    type: boolean
                  racadmEnabled:
                    type: boolean
                  sshEnabled:
                    type: boolean
                  usbManagementPortEnabled:
                    type: boolean
                required:
                - dhcpEnabled
                - ipmiEnabled
                - lockdownModeEnabled
                - osToIdracPassThroughEnabled
                - racadmEnabled
                - sshEnabled
                - usbManagementPortEnabled
                type: object
              oobIP:
                description: OobIP is the iDRAC management IP. The ServerConfig controller
                  targets Redfish here.
                type: string
              serviceTag:
                description: |-
                  ServiceTag is the original-case Dell service tag (e.g. "3RK3V64").
                  Repeated here (vs. deriving from CR name) so the controller has it without string manipulation.
                type: string
            required:
            - hostname
            - oobIP
            - serviceTag
            type: object
          status:
            description: ServerConfigStatus records the controller's observed state.
            properties:
              conditions:
                description: Conditions records detailed status conditions.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              observedFirmwareVersion:
                description: ObservedFirmwareVersion is the firmware version read
                  from Redfish at last reconcile.
                type: string
              phase:
                description: Phase is the current lifecycle phase.
                enum:
                - Pending
                - Applied
                - Diverged
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
